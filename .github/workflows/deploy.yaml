name: Build and Deploy

on:
  push:
    branches:
      - main


jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Chceckout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # necessari to SonarCloud analize the complet history

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: sonarcloud  # Just execute if sonar pass the analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:${{ github.sha }}

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > ~/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install flask-app helm/flask-app \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/flask-app \
            --set image.tag=${{ github.sha }} \
            --set image.pullPolicy=Always